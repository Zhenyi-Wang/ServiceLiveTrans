server:
  host: "0.0.0.0"
  port: 9900
  idle_timeout: 300
  check_interval: 60

gguf:
  # 模型目录，支持 $GGUF_MODEL_DIR 环境变量覆盖
  model_dir: "~/models/qwen3-asr-gguf"
  llm_fn: "qwen3_asr_llm.q4_k.gguf"
  encoder_frontend_fn: "qwen3_asr_encoder_frontend.int4.onnx"
  encoder_backend_fn: "qwen3_asr_encoder_backend.int4.onnx"
  onnx_provider: "CUDA"
  llm_use_gpu: true
  language: "Chinese"
  rollback_num: 5
  memory_chunks: 2
  temperature: 0.4
  n_ctx: 2048
  verbose: false
  # VAD 参数 (Silero VAD)
  vad_threshold: 0.5
  vad_max_buffer_sec: 10.0
  vad_min_buffer_sec: 0.5
  vad_silence_ms: 300
  # 句末标点 flush 最小字数（不含标点）
  sentence_min_len: 5
