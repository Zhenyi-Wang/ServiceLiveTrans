[tool.ruff]
target-version = "py310"
line-length = 120
extend-exclude = [
    "asr/providers/gguf/qwen_asr_gguf",
    "node_modules",
    ".nuxt",
    ".output",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",  # line too long (handled by line-length)
    "B008",  # function call in default argument
]

allowed-confusables = [
    "，",  # Chinese fullwidth comma
    "（",  # Chinese fullwidth left parenthesis
    "）",  # Chinese fullwidth right parenthesis
    "：",  # Chinese fullwidth colon
]

[tool.ruff.lint.isort]
known-first-party = ["asr"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
pythonVersion = "3.10"
pythonPlatform = "Linux"
venvPath = "/home/zhenyi/miniconda3/envs"
venv = "funasr"
include = ["asr"]
exclude = [
    "asr/providers/gguf/qwen_asr_gguf",
    "node_modules",
    ".nuxt",
]
extraPaths = [
    "/home/zhenyi/.local/lib/python3.10/site-packages",
]
reportMissingImports = true
reportMissingTypeStubs = false
reportUnusedImport = "warning"
reportUnusedVariable = "warning"
typeCheckingMode = "basic"
